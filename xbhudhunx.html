<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Djamantara | Jalur Tikus V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-6 font-sans">

    <div id="loading" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-bold uppercase tracking-widest text-blue-400">Sedang Menembus Database...</p>
    </div>

    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-xl font-black italic text-blue-500">D JAMANTARA ADMIN</h1>
        
        <div class="space-y-4 bg-slate-900 p-6 rounded-3xl border border-white/5">
            <input type="text" id="nama" placeholder="Nama Barang" class="w-full p-4 rounded-xl bg-slate-800 outline-none text-sm">
            <input type="number" id="harga" placeholder="Harga" class="w-full p-4 rounded-xl bg-slate-800 outline-none text-sm">
            
            <div class="border-2 border-dashed border-slate-700 p-6 rounded-xl text-center">
                <input type="file" id="foto" accept="image/*" class="hidden" onchange="preview(this)">
                <button onclick="document.getElementById('foto').click()" class="bg-blue-600 px-6 py-2 rounded-lg text-[10px] font-bold">PILIH FOTO</button>
                <img id="view" class="mt-4 w-full hidden rounded-lg shadow-xl">
            </div>

            <button onclick="gas()" class="w-full bg-green-600 py-4 rounded-xl font-black text-xs uppercase">SIMPAN SEKARANG</button>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = {
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);

        window.preview = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('view').src = e.target.result;
                document.getElementById('view').classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        };

        window.gas = async () => {
            const nama = document.getElementById('nama').value;
            const harga = document.getElementById('harga').value;
            const file = document.getElementById('foto').files[0];
            const load = document.getElementById('loading');

            if(!nama || !file) return alert("Nama & Foto harus ada!");
            load.classList.remove('hidden');

            try {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await new Promise(r => img.onload = r);

                const can = document.getElementById('canvas');
                const ctx = can.getContext('2d');
                // Kecilkan ke 400px agar super ringan
                can.width = 400;
                can.height = (img.height / img.width) * 400;
                ctx.drawImage(img, 0, 0, can.width, can.height);
                
                const base64 = can.toDataURL('image/jpeg', 0.6);

                await push(ref(db, 'produk'), {
                    nama: nama,
                    harga: parseInt(harga),
                    gambar: base64
                });

                alert("BERHASIL JEBOL! 🚀");
                location.reload();
            } catch (e) {
                alert("Macet: " + e.message);
            } finally {
                load.classList.add('hidden');
            }
        };
    </script>
</body>
</html>

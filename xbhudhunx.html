<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBHUDHUNX V-FINAL | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #reader { border-radius: 2.5rem !important; overflow: hidden !important; border: 2px solid #3b82f6 !important; }
        #loadingOverlay { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8 text-[10px]">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] hidden flex flex-col items-center justify-center gap-4">
        <div class="w-16 h-16 border-4 border-t-blue-600 border-slate-700 rounded-full animate-spin"></div>
        <p class="text-[10px] font-black uppercase text-blue-400 animate-pulse tracking-widest text-center">SEDANG MENGOMPRES &<br>MENYIMPAN DATA...</p>
    </div>

    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black italic text-blue-400 uppercase leading-none tracking-tighter">XBHUDHUNX</h1>
                <p class="text-[7px] font-bold text-slate-500 tracking-[0.3em] uppercase">Bhumie01 Admin System</p>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-white/5 border border-white/10 px-5 py-2 rounded-2xl font-black uppercase text-[8px] hover:bg-blue-600 transition-all">Toko</button>
        </div>

        <div class="bg-slate-900/50 p-5 rounded-[3rem] border border-white/5 mb-8 shadow-2xl">
            <div id="reader" class="w-full bg-black aspect-video"></div>
            <div class="flex justify-center gap-3 mt-5">
                <button onclick="startScan()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black uppercase text-[9px] shadow-lg shadow-blue-600/20">Scan</button>
                <button onclick="stopScan()" class="bg-slate-800 text-white px-8 py-3 rounded-2xl font-black uppercase text-[9px]">Off</button>
            </div>
        </div>

        <div class="bg-slate-900 p-8 rounded-[3.5rem] border border-white/5 shadow-2xl mb-24">
            <div class="space-y-5">
                <div>
                    <label class="text-[8px] uppercase font-bold text-slate-500 ml-2 mb-1 block">Nama Produk</label>
                    <input type="text" id="nama" placeholder="Contoh: Risol Mayo Premium" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none text-sm font-bold text-white focus:border-blue-500 transition-all">
                </div>

                <div>
                    <label class="text-[8px] uppercase font-bold text-blue-500 ml-2 mb-1 block">ID Barcode / QR (Otomatis)</label>
                    <input type="text" id="barcode" placeholder="Scan untuk isi..." class="w-full p-4 rounded-2xl bg-slate-950 border border-blue-500/30 outline-none text-sm font-mono text-blue-400 font-bold" readonly>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[8px] uppercase font-bold text-slate-500 ml-2 mb-1 block">Harga Dasar</label>
                        <input type="number" id="harga" placeholder="0" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 text-white font-bold">
                    </div>
                    <div>
                        <label class="text-[8px] uppercase font-bold text-slate-500 ml-2 mb-1 block">Stok Total</label>
                        <input type="number" id="stokDasar" placeholder="0" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 text-white font-bold">
                    </div>
                </div>

                <div class="p-5 bg-blue-600/5 rounded-[2rem] border border-blue-500/20">
                    <label class="text-[9px] font-black text-blue-400 uppercase italic mb-2 block">Opsi Varian (Nama:Harga:Stok)</label>
                    <textarea id="stokDetail" placeholder="Kecil:5000:10, Besar:10000:5" class="w-full p-4 h-20 bg-transparent outline-none text-[10px] text-slate-300 font-mono no-scrollbar"></textarea>
                    <p class="text-[6px] text-slate-500 mt-2 uppercase font-bold italic">*Pisahkan varian dengan tanda koma (,)</p>
                </div>

                <div class="p-6 bg-slate-950 rounded-[2.5rem] border border-white/5 text-center">
                    <input type="file" id="fileGambar" accept="image/*" class="hidden" onchange="handlePreview(this)">
                    <button type="button" onclick="document.getElementById('fileGambar').click()" class="bg-white/5 text-slate-300 border border-white/10 px-8 py-3 rounded-2xl font-black uppercase text-[8px] active:scale-95 transition-all">Pilih Foto Produk</button>
                    <img id="imagePreview" class="mt-5 w-40 h-40 mx-auto object-cover rounded-[2rem] border-4 border-white/5 hidden shadow-2xl">
                </div>

                <select id="kategori" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 font-black uppercase text-blue-400 text-[10px]">
                    <option value="Makanan">Makanan</option>
                    <option value="Minuman">Minuman</option>
                    <option value="Digital">Digital</option>
                </select>

                <button onclick="saveToFirebase()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-[2rem] shadow-xl uppercase text-[10px] mt-4 transition-all active:scale-90 tracking-widest">SIMPAN KE DATABASE 🚀</button>
            </div>
        </div>

        <div class="fixed bottom-6 left-0 right-0 px-6 z-40">
            <button onclick="document.getElementById('modalGudang').classList.toggle('hidden')" class="w-full max-w-md mx-auto bg-white text-slate-900 py-5 rounded-full shadow-2xl font-black text-[10px] uppercase border-4 border-blue-600 tracking-tighter">
                📦 GUDANG INVENTORY (<span id="countTxt">0</span>)
            </button>
        </div>

        <div id="modalGudang" class="fixed inset-0 z-50 bg-slate-950 hidden flex flex-col">
            <div class="p-6 bg-slate-900 border-b border-white/5 flex justify-between items-center shadow-xl">
                <h2 class="font-black text-blue-400 uppercase italic tracking-tighter text-xl">Inventory</h2>
                <button onclick="document.getElementById('modalGudang').classList.add('hidden')" class="bg-red-500/10 text-red-500 px-5 py-2 rounded-xl text-[9px] font-black uppercase border border-red-500/20">Tutup</button>
            </div>
            <div class="p-5 flex-1 overflow-y-auto no-scrollbar pb-32" id="inventoryList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        let scanner;

        // Preview & Scanner
        window.handlePreview = (i) => { if(i.files[0]){ const r=new FileReader(); r.onload=(e)=>{ const p=document.getElementById('imagePreview'); p.src=e.target.result; p.classList.remove('hidden'); }; r.readAsDataURL(i.files[0]); } };
        window.startScan = () => { scanner = new Html5Qrcode("reader"); scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 220 }, (t) => { document.getElementById('barcode').value = t; }); };
        window.stopScan = () => { if(scanner) scanner.stop().then(()=>scanner.clear()); };

        // KOMPRESI GAMBAR OTOMATIS (NATIVE)
        async function compressImg(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let w = img.width, h = img.height, max = 850;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.8);
                };
            });
        }

        window.saveToFirebase = async () => {
            const input = (id) => document.getElementById(id).value;
            const file = document.getElementById('fileGambar').files[0];
            const load = document.getElementById('loadingOverlay');
            if(!input('nama') || !file) return alert("Nama & Foto Harus Ada, Boss!");

            load.classList.remove('hidden');
            try {
                const blob = await compressImg(file);
                const sRefImg = sRef(storage, `produk/${Date.now()}.jpg`);
                await uploadBytes(sRefImg, blob);
                const url = await getDownloadURL(sRefImg);

                await push(ref(db, 'produk'), {
                    nama: input('nama'), barcode: input('barcode') || "NOCODE",
                    harga: parseInt(input('harga')) || 0, stokDasar: parseInt(input('stokDasar')) || 0,
                    stokDetail: input('stokDetail') || "", kategori: input('kategori'),
                    gambar: url, timestamp: Date.now()
                });
                alert("Berhasil Disimpan! ⚡");
                location.reload();
            } catch (e) { alert("Error: " + e); } finally { load.classList.add('hidden'); }
        };

        // Render Gudang
        onValue(ref(db, 'produk'), (s) => {
            const data = s.val();
            const list = document.getElementById('inventoryList');
            document.getElementById('countTxt').innerText = data ? Object.keys(data).length : 0;
            list.innerHTML = "";
            for(let id in data) {
                const i = data[id];
                list.innerHTML += `
                    <div class="bg-slate-900 p-5 rounded-[2.5rem] mb-4 border border-white/5 flex items-center gap-4 shadow-xl">
                        <img src="${i.gambar}" class="w-14 h-14 object-cover rounded-2xl bg-black border border-white/10">
                        <div class="flex-1">
                            <h4 class="font-black text-white uppercase text-[10px] leading-tight">${i.nama}</h4>
                            <p class="text-blue-500 font-bold text-[7px] uppercase tracking-widest">${i.barcode}</p>
                        </div>
                        <button onclick="window.delItem('${id}')" class="bg-red-500/10 text-red-500 font-black text-[8px] px-4 py-2 rounded-xl border border-red-500/20">HAPUS</button>
                    </div>`;
            }
        });
        window.delItem = (id) => { if(confirm("Hapus Barang?")) remove(ref(db, `produk/${id}`)); };
    </script>
</body>
</html>

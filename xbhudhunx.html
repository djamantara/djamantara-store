<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Djamantara | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Animasi muncul dari bawah */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4 md:p-8 text-[10px]">

    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-blue-400 uppercase">djamantara</h1>
                <p class="text-[8px] font-bold text-slate-500 tracking-[0.2em] uppercase">Djamantara Admin Panel</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleGudang()" class="bg-blue-600/20 border border-blue-500/30 text-blue-400 px-4 py-2 rounded-xl font-bold uppercase text-[9px]">Gudang</button>
                <button onclick="window.location.href='index.html'" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl font-bold uppercase text-[9px]">Toko</button>
            </div>
        </div>

        <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5 shadow-2xl mb-24">
            <h2 class="text-xl font-black mb-6 text-white italic uppercase tracking-tighter">Tambah Koleksi</h2>
            <div class="space-y-4">
                <input type="text" id="nama" placeholder="Nama Produk" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none text-sm font-bold focus:border-blue-500 text-white">
                
                <select id="kategori" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none font-black uppercase text-blue-400 text-[10px]">
                    <option value="Pribadi">Pribadi</option><option value="Profesional">Profesional</option>
                    <option value="Sosial">Sosial</option><option value="Finansial">Finansial</option>
                    <option value="Logistik">Logistik</option><option value="Edukasi">Edukasi</option>
                    <option value="Digital">Digital</option><option value="Kreativitas">Kreativitas</option>
                    <option value="Legal">Legal</option><option value="Hiburan">Hiburan</option>
                </select>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] uppercase font-bold text-slate-500 ml-2">Harga Dasar</label>
                        <input type="number" id="harga" placeholder="0" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none font-bold text-blue-400">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] uppercase font-bold text-slate-500 ml-2">Stok Dasar</label>
                        <input type="number" id="stokDasar" placeholder="0" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none font-bold text-green-400">
                    </div>
                </div>

                <input type="text" id="gambar" placeholder="URL Link Foto Produk" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none text-[10px]">
                
                <div class="p-5 bg-blue-600/5 rounded-3xl border border-blue-500/20">
                    <label class="block text-[9px] font-black uppercase text-blue-400 mb-2 italic">Opsi Varian (Ukuran:Harga:Stok)</label>
                    <textarea id="stokDetail" placeholder="Contoh: S:50000:10, L:70000:5" class="w-full p-4 h-24 rounded-xl bg-slate-800 border border-slate-700 outline-none text-xs font-mono"></textarea>
                    <p class="text-[8px] text-slate-500 mt-2 font-bold uppercase italic text-center">*Kosongkan jika barang satuan*</p>
                </div>

                <button onclick="simpanData()" id="btnSimpan" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-3xl shadow-xl transition-all uppercase tracking-widest active:scale-95 text-xs">Simpan Ke Database 🚀</button>
            </div>
        </div>

        <div id="overlayGudang" class="fixed inset-0 z-50 bg-slate-950 hidden flex flex-col">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-900">
                <h2 class="text-xl font-black italic text-blue-400 uppercase tracking-tighter">Gudang Djamantara</h2>
                <button onclick="toggleGudang()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl font-black text-[9px] uppercase border border-red-500/20">Tutup</button>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto no-scrollbar pb-32">
                <input type="text" id="cariGudang" oninput="renderGudang()" placeholder="Cari nama produk di gudang..." class="w-full p-4 rounded-2xl bg-slate-900 border border-white/5 outline-none mb-6 text-sm font-bold focus:border-blue-500">
                
                <div id="list-data" class="grid grid-cols-1 gap-4">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let dataFull = {};

        window.simpanData = () => {
            const val = (id) => document.getElementById(id).value;
            if(!val('nama')) return alert("Nama produk kosong!");
            set(push(ref(db, 'produk')), {
                nama: val('nama'), 
                harga: parseInt(val('harga')) || 0,
                stokDasar: parseInt(val('stokDasar')) || 0, 
                kategori: val('kategori'),
                gambar: val('gambar') || "https://via.placeholder.com/300", 
                stokDetail: val('stokDetail') || "", 
                tersedia: true
            }).then(() => {
                alert("Produk Berhasil Masuk!");
                ["nama", "harga", "stokDasar", "stokDetail", "gambar"].forEach(i => document.getElementById(i).value = "");
            });
        };

        window.toggleGudang = () => {
            const ov = document.getElementById('overlayGudang');
            ov.classList.toggle('hidden');
            if(!ov.classList.contains('hidden')) ov.classList.add('animate-up');
        };

        onValue(ref(db, 'produk'), (snap) => {
            dataFull = snap.val();
            renderGudang();
        });

        window.renderGudang = () => {
            const cont = document.getElementById('list-data');
            const keyword = document.getElementById('cariGudang').value.toLowerCase();
            cont.innerHTML = "";
            
            for (let id in dataFull) {
                const item = dataFull[id];
                if(item.nama.toLowerCase().includes(keyword)) {
                    cont.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-[2.5rem] border border-white/5 flex flex-col gap-4 shadow-xl">
                            <div class="flex items-center gap-4">
                                <img src="${item.gambar}" class="w-12 h-12 object-cover rounded-xl bg-slate-950">
                                <div class="flex-1">
                                    <p class="text-white font-black uppercase text-[10px]">${item.nama}</p>
                                    <p class="text-blue-500 font-bold text-[8px] uppercase">${item.kategori}</p>
                                </div>
                                <button onclick="delData('${id}')" class="bg-red-500/10 text-red-500 p-2 rounded-lg font-black text-[8px] uppercase border border-red-500/20">Hapus</button>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-slate-950 p-3 rounded-2xl border border-white/5">
                                    <span class="text-[7px] text-slate-500 uppercase block mb-1">Harga Dasar</span>
                                    <input type="number" id="h-${id}" value="${item.harga}" class="bg-transparent text-blue-400 font-bold outline-none w-full text-xs">
                                </div>
                                <div class="bg-slate-950 p-3 rounded-2xl border border-white/5">
                                    <span class="text-[7px] text-slate-500 uppercase block mb-1">Stok Dasar</span>
                                    <input type="number" id="s-${id}" value="${item.stokDasar}" class="bg-transparent text-green-400 font-bold outline-none w-full text-xs">
                                </div>
                            </div>

                            <div class="bg-slate-950 p-3 rounded-2xl border border-white/5">
                                <span class="text-[7px] text-slate-500 uppercase block mb-1">Varian (Size:Harga:Stok)</span>
                                <input type="text" id="ed-${id}" value="${item.stokDetail}" class="bg-transparent text-slate-300 font-mono outline-none w-full text-[9px]">
                            </div>

                            <button onclick="upStk('${id}')" class="w-full bg-blue-600/10 text-blue-400 border border-blue-600/20 font-black py-3 rounded-xl uppercase hover:bg-blue-600 hover:text-white transition-all text-[9px]">Update Data</button>
                        </div>`;
                }
            }
        };

        window.upStk = (id) => {
            const h = document.getElementById(`h-${id}`).value;
            const s = document.getElementById(`s-${id}`).value;
            const v = document.getElementById(`ed-${id}`).value;
            update(ref(db, `produk/${id}`), { 
                harga: parseInt(h), 
                stokDasar: parseInt(s), 
                stokDetail: v 
            }).then(() => alert("Data di Gudang Berhasil Diperbarui!"));
        };

        window.delData = (id) => {
            if(confirm("Hapus permanen dari gudang?")) {
                remove(ref(db, 'produk/' + id));
            }
        };
    </script>
</body>
</html>

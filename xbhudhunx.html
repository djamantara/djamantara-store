<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Djamantara | V-FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #reader { border-radius: 2rem !important; overflow: hidden !important; border: 2px solid #3b82f6 !important; }
        #loadingOverlay { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8 text-[10px]">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] hidden flex flex-col items-center justify-center gap-4">
        <div class="w-16 h-16 border-4 border-t-blue-600 border-slate-700 rounded-full animate-spin"></div>
        <p class="text-[9px] font-black uppercase text-white animate-pulse">Sedang Memproses...</p>
    </div>

    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black italic text-blue-400 uppercase">XBHUDHUNX</h1>
            <button onclick="window.location.href='index.html'" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl font-bold uppercase text-[9px]">Toko</button>
        </div>

        <div class="bg-slate-900/50 p-4 rounded-[2.5rem] border border-white/5 mb-6">
            <div id="reader" class="w-full bg-black aspect-video"></div>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="startScan()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black uppercase text-[9px]">Scan</button>
                <button onclick="stopScan()" class="bg-slate-800 text-white px-6 py-3 rounded-2xl font-black uppercase text-[9px]">Off</button>
            </div>
        </div>

        <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5 shadow-2xl mb-24">
            <div class="space-y-4">
                <input type="text" id="nama" placeholder="Nama Produk..." class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none text-sm font-bold text-white">
                
                <input type="text" id="barcode" placeholder="Barcode (Scan Otomatis)..." class="w-full p-4 rounded-2xl bg-slate-950 border border-blue-500/30 outline-none text-sm font-mono text-blue-400 font-bold" readonly>
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="harga" placeholder="Harga Utama" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 text-white font-bold">
                    <input type="number" id="stok" placeholder="Stok Total" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 text-white font-bold">
                </div>

                <div class="p-4 bg-blue-600/5 rounded-2xl border border-blue-500/20">
                    <label class="text-[8px] font-black text-blue-400 uppercase italic">Varian (Ukuran:Harga:Stok)</label>
                    <textarea id="stokDetail" placeholder="Kecil:5000:10, Besar:10000:5" class="w-full p-3 h-16 bg-transparent outline-none text-[10px] text-slate-300 font-mono mt-2"></textarea>
                </div>

                <div class="p-5 bg-slate-950 rounded-3xl border border-white/5 text-center">
                    <input type="file" id="fileGambar" accept="image/*" class="hidden" onchange="previewImg(this)">
                    <button type="button" onclick="document.getElementById('fileGambar').click()" class="bg-blue-600/20 text-blue-400 border border-blue-500/30 px-6 py-3 rounded-xl font-black uppercase text-[8px]">Pilih Foto</button>
                    <img id="imagePreview" src="" class="mt-4 w-32 h-32 mx-auto object-cover rounded-2xl hidden border-2 border-white/10">
                </div>

                <select id="kategori" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 font-black uppercase text-blue-400 text-[10px]">
                    <option value="Makanan">Makanan</option>
                    <option value="Minuman">Minuman</option>
                    <option value="Lainnya">Lainnya</option>
                </select>

                <button onclick="uploadData()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl shadow-xl uppercase text-[10px] mt-4 active:scale-95">Simpan Produk 🚀</button>
            </div>
        </div>

        <div class="fixed bottom-6 left-0 right-0 px-6 z-40 text-center">
            <button onclick="toggleGudang()" class="w-full max-w-md mx-auto bg-slate-100 text-slate-900 py-5 rounded-full shadow-2xl font-black text-[10px] uppercase border-4 border-blue-500">
                📦 GUDANG (<span id="countTxt">0</span>)
            </button>
        </div>

        <div id="modalGudang" class="fixed inset-0 z-50 bg-slate-950 hidden flex flex-col">
            <div class="p-6 bg-slate-900 flex justify-between items-center shadow-xl">
                <h2 class="font-black text-blue-400 uppercase italic">Inventory</h2>
                <button onclick="toggleGudang()" class="text-red-500 font-black text-sm px-4">X</button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto" id="listGudang"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        let scanner;

        window.previewImg = (i) => { if(i.files[0]){ const r=new FileReader(); r.onload=(e)=>{ const p=document.getElementById('imagePreview'); p.src=e.target.result; p.classList.remove('hidden'); }; r.readAsDataURL(i.files[0]); } };
        window.startScan = () => { scanner = new Html5Qrcode("reader"); scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 200 }, (t) => { document.getElementById('barcode').value = t; }); };
        window.stopScan = () => { if(scanner) scanner.stop().then(()=>scanner.clear()); };

        async function compress(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                const timeout = setTimeout(() => resolve(file), 4000); // Safety timeout
                img.onload = () => {
                    clearTimeout(timeout);
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height, max = 800;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (height > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob((b) => resolve(b || file), 'image/jpeg', 0.7);
                };
            });
        }

        window.uploadData = async () => {
            const val = (id) => document.getElementById(id).value;
            const file = document.getElementById('fileGambar').files[0];
            const load = document.getElementById('loadingOverlay');
            if(!val('nama') || !file) return alert("Lengkapi Nama & Foto!");

            load.classList.remove('hidden');
            try {
                const blob = await compress(file);
                const sRefImg = sRef(storage, `produk/${Date.now()}.jpg`);
                const snap = await uploadBytes(sRefImg, blob);
                const url = await getDownloadURL(snap.ref);

                await push(ref(db, 'produk'), {
                    nama: val('nama'), barcode: val('barcode') || "NOCODE",
                    harga: parseInt(val('harga')) || 0, stokDasar: parseInt(val('stok')) || 0,
                    stokDetail: val('stokDetail'), kategori: val('kategori'), gambar: url
                });
                alert("Tersimpan!"); location.reload();
            } catch (e) { alert(e); } finally { load.classList.add('hidden'); }
        };

        window.toggleGudang = () => document.getElementById('modalGudang').classList.toggle('hidden');
        onValue(ref(db, 'produk'), (s) => {
            const data = s.val();
            const list = document.getElementById('listGudang');
            document.getElementById('countTxt').innerText = data ? Object.keys(data).length : 0;
            list.innerHTML = "";
            for(let id in data) {
                const i = data[id];
                list.innerHTML += `<div class="bg-slate-900 p-4 rounded-3xl mb-3 flex items-center gap-4 border border-white/5">
                    <img src="${i.gambar}" class="w-10 h-10 object-cover rounded-xl bg-black">
                    <div class="flex-1 font-bold text-[10px] uppercase">${i.nama}</div>
                    <button onclick="delData('${id}')" class="text-red-500 font-black text-[8px]">HAPUS</button>
                </div>`;
            }
        });
        window.delData = (id) => { if(confirm("Hapus?")) remove(ref(db, `produk/${id}`)); };
    </script>
</body>
</html>

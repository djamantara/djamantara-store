<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Djamantara | Full Control (No Storage)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #reader { border-radius: 2rem !important; overflow: hidden !important; border: 2px solid rgba(59, 130, 246, 0.3) !important; }
        #reader video { object-fit: cover !important; }
        #loadingOverlay { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8 text-[10px]">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] hidden flex flex-col items-center justify-center gap-4">
        <div class="w-16 h-16 border-4 border-t-blue-600 border-slate-700 rounded-full animate-spin"></div>
        <p class="text-[9px] font-black uppercase text-blue-400 animate-pulse">Menembus Database...</p>
    </div>

    <div class="max-w-xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-blue-400 uppercase leading-none">XBHUDHUNX</h1>
                <p class="text-[7px] font-bold text-slate-500 tracking-[0.3em] uppercase">Pro Management System</p>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl font-bold uppercase text-[9px]">View Shop</button>
        </div>

        <div class="bg-slate-900/50 p-4 rounded-[2.5rem] border border-white/5 mb-6">
            <div id="reader" class="w-full bg-black"></div>
            <div class="flex justify-center gap-2 mt-4">
                <button onclick="mulaiKamera()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-2xl font-black uppercase text-[9px]">Kamera</button>
                <button onclick="stopKamera()" class="bg-slate-800 text-white px-6 py-3 rounded-2xl font-black uppercase text-[9px]">Off</button>
            </div>
            <p id="scanResult" class="text-center mt-3 text-[7px] text-blue-500 uppercase font-black">Status: Scanner Ready</p>
        </div>

        <div class="bg-slate-900 p-8 rounded-[3rem] border border-white/5 shadow-2xl mb-24">
            <h2 class="text-xl font-black mb-6 text-white italic uppercase tracking-tighter decoration-blue-500 underline-offset-8">Tambah Koleksi</h2>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[8px] uppercase font-bold text-slate-500 ml-2">Nama Barang</label>
                    <input type="text" id="nama" placeholder="Contoh: Risol Mayo Spesial" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none text-sm font-bold focus:border-blue-500 text-white">
                </div>

                <div class="space-y-1">
                    <label class="text-[8px] uppercase font-bold text-blue-500 ml-2">Kode Barcode / QR (Dinamis)</label>
                    <input type="text" id="barcode" placeholder="Scan untuk isi otomatis..." class="w-full p-4 rounded-2xl bg-slate-950 border border-blue-500/30 outline-none text-sm font-mono text-blue-400 font-bold" readonly>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] uppercase font-bold text-slate-500 ml-2">Harga Utama</label>
                        <input type="number" id="harga" placeholder="0" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none font-bold text-white">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] uppercase font-bold text-slate-500 ml-2">Total Stok</label>
                        <input type="number" id="stokDasar" placeholder="0" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none font-bold text-white">
                    </div>
                </div>

                <div class="p-5 bg-blue-600/5 rounded-3xl border border-blue-500/20">
                    <label class="block text-[9px] font-black uppercase text-blue-400 mb-2 italic">Opsi Varian (Ukuran:Harga:Stok)</label>
                    <textarea id="stokDetail" placeholder="Contoh: Kecil:5000:10, Besar:10000:5" class="w-full p-4 h-20 rounded-xl bg-slate-800 border border-slate-700 outline-none text-xs font-mono text-slate-300"></textarea>
                </div>

                <div class="space-y-1 p-5 bg-slate-950 rounded-3xl border border-white/5 flex flex-col items-center">
                    <label class="text-[9px] uppercase font-black text-white italic mb-3">Foto Produk</label>
                    <input type="file" id="fileGambar" accept="image/*" class="hidden" onchange="previewGambar(this)">
                    <button type="button" onclick="document.getElementById('fileGambar').click()" class="bg-blue-600/10 text-blue-400 border border-blue-500/20 px-6 py-3 rounded-xl font-bold uppercase text-[8px] active:scale-95 transition-all">Pilih Foto dari HP</button>
                    <img id="imagePreview" src="" class="mt-4 w-32 h-32 object-cover rounded-2xl border-4 border-white/5 shadow-xl hidden">
                </div>

                <div class="space-y-1">
                    <label class="text-[8px] uppercase font-bold text-slate-500 ml-2">Kategori</label>
                    <select id="kategori" class="w-full p-4 rounded-2xl bg-slate-800 border border-slate-700 outline-none font-black uppercase text-blue-400 text-[10px]">
                        <option value="Pribadi">Pribadi</option><option value="Profesional">Profesional</option>
                        <option value="Logistik">Logistik</option><option value="Digital">Digital</option>
                    </select>
                </div>

                <button onclick="simpanData()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-3xl shadow-xl transition-all uppercase tracking-widest active:scale-95 text-[10px] mt-4">Simpan Ke Database 🚀</button>
            </div>
        </div>

        <div class="fixed bottom-6 left-0 right-0 px-6 z-40 text-center">
            <button onclick="toggleGudang()" class="w-full max-w-md mx-auto bg-slate-100 text-slate-900 py-5 rounded-full shadow-2xl font-black text-[10px] uppercase border-4 border-blue-500">
                📦 GUDANG (<span id="countGudang">0</span>)
            </button>
        </div>

        <div id="overlayGudang" class="fixed inset-0 z-50 bg-slate-950 hidden flex flex-col">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-900">
                <h2 class="text-xl font-black italic text-blue-400 uppercase tracking-tighter">Inventory List</h2>
                <button onclick="toggleGudang()" class="bg-red-500 text-white px-4 py-2 rounded-xl font-black text-[9px] uppercase">Tutup</button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto no-scrollbar pb-32">
                <input type="text" id="cariGudang" oninput="renderGudang()" placeholder="Cari Nama atau Kode Barcode..." class="w-full p-5 rounded-2xl bg-slate-900 border border-blue-500/20 outline-none mb-6 text-sm font-bold text-white focus:border-blue-500">
                <div id="list-data" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>
    </div>

    <canvas id="compCanvas" class="hidden"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // HANYA DATABASE, TANPA STORAGE
        const firebaseConfig = {
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let dataFull = {}, html5QrCode;

        // FUNGSI PREVIEW GAMBAR
        window.previewGambar = (input) => {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        // SCANNER ( QR & Barcode )
        window.mulaiKamera = () => {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 180 }, aspectRatio: 1.0 };
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                document.getElementById('barcode').value = decodedText;
                document.getElementById('scanResult').innerText = "DETEKSI: " + decodedText;
            }).catch(err => alert("Izin Kamera Ditolak!"));
        };

        window.stopKamera = () => { if (html5QrCode) html5QrCode.stop().then(() => html5QrCode.clear()).catch(e => console.log(e)); };

        // FUNGSI INTI: SIMPAN DATA PAKAI JALUR TIKUS (BASE64)
        window.simpanData = async () => {
            const val = (id) => document.getElementById(id).value;
            const fileInput = document.getElementById('fileGambar');
            const file = fileInput.files[0];
            const loading = document.getElementById('loadingOverlay');

            if(!val('nama') || !file) return alert("Lengkapi Nama dan Pilih Foto!");

            loading.classList.remove('hidden');

            try {
                // Kompresi Gambar langsung ke Base64 (Tanpa Storage)
                const img = new Image();
                img.src = URL.createObjectURL(file);
                await new Promise(resolve => img.onload = resolve);

                const compCanvas = document.getElementById('compCanvas');
                const ctx = compCanvas.getContext('2d');
                
                // Ukuran dikecilkan agar database tidak penuh
                const maxDim = 500;
                let w = img.width, h = img.height;
                if (w > maxDim || h > maxDim) {
                    if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                    else { w = Math.round(w * maxDim / h); h = maxDim; }
                }

                compCanvas.width = w; 
                compCanvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                
                const fotoBase64 = compCanvas.toDataURL('image/jpeg', 0.6);

                // Kirim semua data ke Database
                await push(ref(db, 'produk'), {
                    nama: val('nama'),
                    barcode: val('barcode') || "No Code",
                    harga: parseInt(val('harga')) || 0,
                    stokDasar: parseInt(val('stokDasar')) || 0,
                    stokDetail: val('stokDetail') || "",
                    kategori: val('kategori'),
                    gambar: fotoBase64, // Disimpan sebagai teks
                    tersedia: true
                });

                loading.classList.add('hidden');
                alert("Berhasil Disimpan! Upload Kilat 🚀");
                
                // Reset form
                ["nama", "barcode", "harga", "stokDasar", "stokDetail"].forEach(i => document.getElementById(i).value = "");
                fileInput.value = "";
                document.getElementById('imagePreview').classList.add('hidden');
                
            } catch (error) {
                loading.classList.add('hidden');
                alert("Gagal: " + error.message);
            }
        };

        // GUDANG & UPDATE DATA
        window.toggleGudang = () => document.getElementById('overlayGudang').classList.toggle('hidden');

        onValue(ref(db, 'produk'), (snap) => {
            dataFull = snap.val();
            document.getElementById('countGudang').innerText = Object.keys(dataFull || {}).length;
            renderGudang();
        });

        window.renderGudang = () => {
            const cont = document.getElementById('list-data');
            const keyword = document.getElementById('cariGudang').value.toLowerCase();
            cont.innerHTML = "";
            for (let id in dataFull) {
                const item = dataFull[id];
                if(item.nama.toLowerCase().includes(keyword) || (item.barcode || "").toLowerCase().includes(keyword)) {
                    cont.innerHTML += `
                        <div class="bg-slate-900 p-5 rounded-[2.5rem] border border-white/5 flex flex-col gap-4 shadow-xl">
                            <div class="flex items-center gap-4">
                                <img src="${item.gambar}" class="w-12 h-12 object-cover rounded-2xl bg-black border border-white/10">
                                <div class="flex-1">
                                    <p class="text-white font-black uppercase text-[10px] leading-tight">${item.nama}</p>
                                    <p class="text-blue-500 font-bold text-[7px] uppercase">${item.barcode || 'No Code'}</p>
                                </div>
                                <button onclick="delData('${id}')" class="text-red-500 font-black text-[8px] bg-red-500/10 px-3 py-2 rounded-xl border border-red-500/20">Hapus</button>
                            </div>
                            <div class="p-3 bg-slate-950 rounded-2xl border border-white/5">
                                <p class="text-[7px] uppercase font-bold text-slate-500 mb-1 ml-1">Varian Detail</p>
                                <textarea id="sd-${id}" class="bg-transparent text-slate-300 font-mono w-full text-[9px] outline-none h-12 no-scrollbar">${item.stokDetail || ''}</textarea>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="bg-slate-950 p-3 rounded-2xl border border-white/5">
                                    <input type="number" id="h-${id}" value="${item.harga}" class="bg-transparent text-blue-400 font-bold w-full text-xs">
                                </div>
                                <div class="bg-slate-950 p-3 rounded-2xl border border-white/5">
                                    <input type="number" id="s-${id}" value="${item.stokDasar}" class="bg-transparent text-green-400 font-bold w-full text-xs">
                                </div>
                            </div>
                            <button onclick="upStk('${id}')" class="w-full bg-blue-600/10 text-blue-400 border border-blue-600/20 py-3 rounded-2xl uppercase text-[8px] hover:bg-blue-600 hover:text-white transition-all">Update Perubahan</button>
                        </div>`;
                }
            }
        };

        window.upStk = (id) => {
            update(ref(db, `produk/${id}`), {
                harga: parseInt(document.getElementById(`h-${id}`).value) || 0,
                stokDasar: parseInt(document.getElementById(`s-${id}`).value) || 0,
                stokDetail: document.getElementById(`sd-${id}`).value
            }).then(() => alert("Data Berhasil Diperbarui!"));
        };

        window.delData = (id) => { if(confirm("Hapus Barang Ini?")) remove(ref(db, 'produk/' + id)); };
    </script>
</body>
</html>

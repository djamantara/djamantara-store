<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djamantara | Exclusive Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #cbd5e1; }
        
        .glass-nav { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); }
        
        .product-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .product-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.2); }
        
        .img-gradient { background: linear-gradient(to bottom, transparent 60%, rgba(2, 6, 23, 0.8)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .btn-primary { background: var(--accent); transition: all 0.3s; }
        .btn-primary:hover { filter: brightness(1.1); transform: scale(1.02); }
        
        .receipt-dashed { border-top: 2px dashed rgba(255,255,255,0.1); position: relative; }
        .receipt-dashed::before, .receipt-dashed::after { 
            content: ''; position: absolute; top: -10px; width: 20px; height: 20px; 
            background: #0f172a; border-radius: 50%; 
        }
        .receipt-dashed::before { left: -30px; }
        .receipt-dashed::after { right: -30px; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[60] glass-nav py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-2xl font-extrabold italic text-white tracking-tighter uppercase leading-none">Djamantara</h1>
                <span class="text-[8px] font-bold tracking-[0.3em] text-indigo-400 uppercase">Premium Supply</span>
            </div>
            <div class="flex items-center gap-4">
                <input type="text" id="searchInput" onkeyup="searchHandler()" placeholder="Cari produk..." 
                    class="hidden md:block bg-slate-900/50 border border-white/10 rounded-xl py-2.5 px-5 outline-none text-xs font-medium w-64 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                <button onclick="toggleModal('modalHelp')" class="text-[10px] font-bold uppercase text-white/70 hover:text-indigo-400 transition-colors">Bantuan</button>
            </div>
        </div>
    </nav>

    <div id="modalNota" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center hidden p-4">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] max-w-lg w-full shadow-2xl relative overflow-hidden">
            <div class="text-center mb-8">
                <div class="w-12 h-1 bg-indigo-500 mx-auto mb-4 rounded-full"></div>
                <h2 class="text-xl font-bold text-white uppercase tracking-tight">Ringkasan Pesanan</h2>
                <p class="text-[10px] text-slate-500 font-medium uppercase mt-1 tracking-widest">Order ID: #DJM-RTDB</p>
            </div>
            
            <div id="isiNota" class="space-y-3 max-h-[40vh] overflow-y-auto no-scrollbar mb-8 px-1">
                </div>

            <div class="receipt-dashed pt-6 mb-8 flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Total Pembayaran</p>
                    <p id="subtotalNota" class="text-3xl font-extrabold text-white tracking-tighter">Rp 0</p>
                </div>
                <div class="text-right">
                    <span class="px-3 py-1 bg-indigo-500/10 text-indigo-400 rounded-full text-[9px] font-bold uppercase tracking-tighter">Official Store</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="toggleModal('modalNota')" class="py-4 rounded-2xl font-bold text-[11px] uppercase text-slate-400 bg-white/5 hover:bg-white/10 transition-all border border-white/5">Kembali</button>
                <button onclick="sendToWA()" class="btn-primary py-4 rounded-2xl font-bold text-[11px] uppercase text-white shadow-lg shadow-indigo-600/20">Checkout WhatsApp</button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12 pb-40">
        <div class="flex items-center gap-4 mb-12 overflow-x-auto no-scrollbar pb-2">
            <button onclick="filterProduk('Semua', this)" class="cat-btn bg-indigo-600 text-white px-7 py-3 rounded-xl font-bold text-[11px] uppercase whitespace-nowrap shadow-lg shadow-indigo-600/20">Semua</button>
            <button onclick="filterProduk('Pribadi', this)" class="cat-btn glass-card px-7 py-3 rounded-xl text-[11px] font-bold uppercase text-slate-400 whitespace-nowrap hover:bg-white/5">Pribadi</button>
            <button onclick="filterProduk('Profesional', this)" class="cat-btn glass-card px-7 py-3 rounded-xl text-[11px] font-bold uppercase text-slate-400 whitespace-nowrap hover:bg-white/5">Profesional</button>
            <button onclick="filterProduk('Digital', this)" class="cat-btn glass-card px-7 py-3 rounded-xl text-[11px] font-bold uppercase text-slate-400 whitespace-nowrap hover:bg-white/5">Digital</button>
        </div>

        <div id="container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="cart" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[80] w-[90%] max-w-md hidden">
        <div class="bg-indigo-600 p-5 rounded-[2rem] shadow-2xl text-white flex justify-between items-center border border-white/20">
            <div class="pl-4">
                <p class="text-[9px] font-bold uppercase text-indigo-200">Total Sementara</p>
                <p class="font-bold text-xl tracking-tighter" id="cartTotalText">Rp 0</p>
            </div>
            <button onclick="showBill()" class="bg-white text-indigo-600 px-8 py-3.5 rounded-xl font-extrabold uppercase text-[11px] shadow-lg hover:bg-slate-100 transition-all active:scale-95">
                Lihat Nota
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Logic Original dipertahankan
        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let rawData = {}, cart = [], curFilter = 'Semua';

        onValue(ref(db, 'produk'), (snap) => { rawData = snap.val(); render(); });

        window.toggleModal = (id) => {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        };

        window.filterProduk = (kat, btn) => {
            curFilter = kat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.className = "cat-btn glass-card px-7 py-3 rounded-xl text-[11px] font-bold uppercase text-slate-400 whitespace-nowrap hover:bg-white/5 transition-all";
            });
            btn.className = "cat-btn bg-indigo-600 text-white px-7 py-3 rounded-xl font-bold text-[11px] uppercase whitespace-nowrap shadow-lg shadow-indigo-600/20 transition-all";
            render();
        };

        const priceFmt = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits:0 }).format(v);

        window.render = (key = '') => {
            const cont = document.getElementById('container');
            cont.innerHTML = "";
            for(let id in rawData) {
                const item = rawData[id];
                if((curFilter === 'Semua' || item.kategori === curFilter) && item.nama.toLowerCase().includes(key.toLowerCase())) {
                    let iniPrice = item.harga;
                    let varHtml = "";
                    
                    if (item.stokDetail) {
                        const vList = item.stokDetail.split(',');
                        const firstPrice = vList[0].split(':')[1];
                        iniPrice = parseInt(firstPrice);
                        varHtml = `<select id="sel-${id}" onchange="upPrice('${id}', this)" class="w-full mb-4 p-3 rounded-xl bg-slate-950 border border-white/10 text-[11px] font-bold uppercase text-indigo-400 outline-none focus:border-indigo-500">`;
                        vList.forEach(v => {
                            const [sz, pr, qt] = v.split(':');
                            if(parseInt(qt) > 0) varHtml += `<option value="${sz.trim()}" data-price="${pr.trim()}">${sz.trim()} — ${priceFmt(pr.trim())}</option>`;
                        });
                        varHtml += `</select>`;
                    }

                    cont.innerHTML += `
                        <div class="product-card glass-card rounded-[2.5rem] overflow-hidden flex flex-col h-full relative">
                            <div class="relative overflow-hidden group">
                                <img src="${item.gambar}" class="w-full h-72 object-cover transition-transform duration-700 group-hover:scale-110">
                                <div class="absolute inset-0 img-gradient"></div>
                                <div class="absolute top-5 right-5">
                                    <span class="bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest text-white border border-white/10">
                                        ${item.kategori}
                                    </span>
                                </div>
                            </div>
                            <div class="p-7 flex flex-col flex-1">
                                <h3 class="text-lg font-bold text-white mb-4 uppercase tracking-tight leading-tight">${item.nama}</h3>
                                <div class="mt-auto">
                                    ${varHtml}
                                    <div class="flex items-center justify-between gap-2">
                                        <p id="prc-${id}" class="text-white font-extrabold text-xl tracking-tighter">${priceFmt(iniPrice)}</p>
                                        <button onclick="${item.tersedia ? `toCart('${id}')` : ''}" 
                                            class="p-4 rounded-xl transition-all ${item.tersedia ? 'bg-indigo-600 text-white hover:bg-indigo-500 shadow-lg shadow-indigo-600/10' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                }
            }
        };

        window.upPrice = (id, el) => {
            const pr = el.options[el.selectedIndex].getAttribute('data-price');
            document.getElementById(`prc-${id}`).innerText = priceFmt(pr);
        };

        window.toCart = (id) => {
            const el = document.getElementById(`sel-${id}`);
            const pr = el ? parseInt(el.options[el.selectedIndex].getAttribute('data-price')) : rawData[id].harga;
            const sz = el ? el.value : '-';
            const exist = cart.find(i => i.id === id && i.sz === sz);
            if(exist) { exist.qty += 1; } else { cart.push({ id, nama: rawData[id].nama, harga: pr, sz, qty: 1 }); }
            upUI();
        };

        window.changeQty = (index, delta) => {
            cart[index].qty += delta;
            if(cart[index].qty < 1) cart.splice(index, 1);
            if(cart.length === 0) toggleModal('modalNota');
            showBill();
            upUI();
        };

        function upUI() {
            const total = cart.reduce((s, i) => s + (i.harga * i.qty), 0);
            if(cart.length > 0) {
                document.getElementById('cart').classList.remove('hidden');
                document.getElementById('cartTotalText').innerText = priceFmt(total);
            } else {
                document.getElementById('cart').classList.add('hidden');
            }
        }

        window.showBill = () => {
            const isi = document.getElementById('isiNota');
            let total = 0;
            isi.innerHTML = "";
            cart.forEach((item, index) => {
                const sub = item.harga * item.qty;
                total += sub;
                isi.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-3xl border border-white/5 flex flex-col gap-3">
                        <div class="flex justify-between items-start">
                            <div class="max-w-[150px]">
                                <h4 class="text-[11px] font-bold text-white uppercase truncate">${item.nama}</h4>
                                <p class="text-[9px] text-slate-500 font-medium uppercase mt-0.5">${item.sz} • ${priceFmt(item.harga)}</p>
                            </div>
                            <p class="text-xs font-bold text-indigo-400">${priceFmt(sub)}</p>
                        </div>
                        <div class="flex items-center justify-between border-t border-white/5 pt-3">
                            <div class="flex items-center bg-slate-950 rounded-lg border border-white/5 p-0.5">
                                <button onclick="changeQty(${index}, -1)" class="w-7 h-7 flex items-center justify-center text-slate-400 hover:text-white">-</button>
                                <span class="px-3 text-[10px] font-bold text-white">${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)" class="w-7 h-7 flex items-center justify-center text-slate-400 hover:text-white">+</button>
                            </div>
                            <button onclick="changeQty(${index}, -${item.qty})" class="text-[8px] font-bold text-red-500/60 uppercase tracking-widest hover:text-red-400 transition-colors">Hapus</button>
                        </div>
                    </div>`;
            });
            document.getElementById('subtotalNota').innerText = priceFmt(total);
            if(document.getElementById('modalNota').classList.contains('hidden')) toggleModal('modalNota');
        };

        window.sendToWA = () => {
            let total = 0;
            let msg = `*DJAMANTARA OFFICIAL STORE*%0A━━━━━━━━━━━━━━━━━━━━%0A`;
            cart.forEach((i, x) => {
                const sub = i.harga * i.qty;
                total += sub;
                msg += `${x+1}. *${i.nama}*%0A   Varian: ${i.sz}%0A   Qty: ${i.qty} x ${i.harga.toLocaleString()}%0A   Sub: *Rp ${sub.toLocaleString()}*%0A%0A`;
            });
            msg += `━━━━━━━━━━━━━━━━━━━━%0A*TOTAL TAGIHAN: Rp ${total.toLocaleString()}*%0A━━━━━━━━━━━━━━━━━━━━%0A_Mohon segera diproses ya, Admin!_`;
            window.open(`https://wa.me/62895397276430?text=${msg}`, '_blank');
            cart = []; upUI(); toggleModal('modalNota');
        };

        window.searchHandler = () => render(document.getElementById('searchInput').value);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djamantara | Bhumie01 Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-900 pb-24">

    <div class="bg-blue-600 p-6 rounded-b-[3rem] shadow-xl text-white mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">DJAMANTARA</h1>
        <p class="text-[9px] font-bold opacity-80 uppercase tracking-widest">Bhumie01 Store</p>
    </div>

    <div class="px-6">
        <div id="product-container" class="grid grid-cols-2 gap-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'produk'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('product-container');
            container.innerHTML = "";

            for (let id in data) {
                const item = data[id];
                
                // Logika Hitung Harga (Utama vs Varian)
                let hargaTampil = item.harga || 0;
                let labelVarian = "";

                if (item.stokDetail && item.stokDetail.includes(':')) {
                    const varian = item.stokDetail.split(',').map(v => v.split(':'));
                    const daftarHarga = varian.map(v => parseInt(v[1])).filter(h => !isNaN(h));
                    if (daftarHarga.length > 0) {
                        hargaTampil = Math.min(...daftarHarga);
                        labelVarian = "<span class='text-[7px] text-slate-400 font-bold uppercase'>Mulai dari</span>";
                    }
                }

                container.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] p-3 shadow-sm border border-slate-100 product-card">
                        <div class="relative w-full aspect-square overflow-hidden rounded-[2rem] mb-3 bg-slate-50">
                            <img src="${item.gambar}" class="w-full h-full object-cover">
                        </div>
                        <div class="px-1">
                            <h3 class="font-black text-slate-900 text-[10px] uppercase leading-tight truncate">${item.nama}</h3>
                            <div class="mt-1">
                                ${labelVarian}
                                <p class="font-black text-blue-600 text-sm leading-none">Rp ${hargaTampil.toLocaleString('id-ID')}</p>
                            </div>
                        </div>
                        <button class="w-full bg-blue-600 text-white font-black py-4 rounded-3xl text-[8px] uppercase mt-3 active:scale-95 transition-all">
                            Beli Sekarang
                        </button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>

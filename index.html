<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Djamantara | Exclusive Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #cbd5e1; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05); 
        }
        
        /* Product Card Visuals */
        .product-img-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1/1; 
            overflow: hidden; 
            border-radius: 16px; 
        }
        .product-img-container img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:active img { transform: scale(1.05); }
        
        /* Gradient Overlay for Text Clarity */
        .img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(2, 6, 23, 0.8) 0%, transparent 60%);
        }

        /* Floating Receipt Animation */
        .live-receipt { 
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(99, 102, 241, 0.3);
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .live-receipt.active { transform: translateY(0); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Skeleton Loading Effect */
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-[60] bg-[#020617]/80 backdrop-blur-md border-b border-white/5 py-5 px-6">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div>
                <h1 class="text-2xl font-extrabold italic tracking-tighter uppercase leading-none text-white">Djamantara</h1>
                <p class="text-[8px] font-bold tracking-[0.3em] uppercase text-indigo-400 mt-1">Premium Digital Supply</p>

            <button onclick="scrollKeRincian()" class="bg-indigo-600 p-2.5 rounded-full shadow-lg shadow-indigo-600/20 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />

        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let rawData = {}, cart = [], curFilter = 'Semua';

        // Load Data
        onValue(ref(db, 'produk'), (snap) => { 
            rawData = snap.val(); 
            render(); 
        });

        const priceFmt = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits:0 }).format(v);

        window.filterProduk = (kat, btn) => {
            curFilter = kat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.className = "cat-btn glass-card px-5 py-2 rounded-full text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap transition-all";
            });
            btn.className = "cat-btn bg-indigo-600 text-white px-5 py-2 rounded-full font-bold text-[10px] uppercase whitespace-nowrap transition-all shadow-lg shadow-indigo-600/20";
            render();
        };

        window.render = (key = '') => {
            const cont = document.getElementById('container');
            cont.innerHTML = "";
            for(let id in rawData) {
                const item = rawData[id];
                const searchMatch = item.nama.toLowerCase().includes(key.toLowerCase());
                const categoryMatch = curFilter === 'Semua' || item.kategori === curFilter;

                if(searchMatch && categoryMatch) {
                    cont.innerHTML += `
                        <div class="product-card flex flex-col group">
                            <div class="product-img-container shadow-2xl">
                                <img src="${item.gambar}" loading="lazy" alt="${item.nama}">
                                <div class="img-overlay"></div>
                                <div class="absolute bottom-3 left-3 right-3">
                                    <h3 class="text-[11px] font-bold text-white leading-tight mb-1 truncate">${item.nama}</h3>
                                    <p class="text-indigo-400 font-extrabold text-sm tracking-tight">${priceFmt(item.harga)}</p>
                                </div>
                            </div>
                            <button onclick="toCart('${id}')" class="mt-3 w-full py-3 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-bold uppercase text-white active:bg-indigo-600 active:border-indigo-600 transition-all">
                                + Keranjang
                            </button>
                        </div>`;
                }
            }
        };

        window.toCart = (id) => {
            const item = rawData[id];
            const exist = cart.find(i => i.id === id);
            if(exist) { exist.qty += 1; } else { cart.push({ id, nama: item.nama, harga: item.harga, gambar: item.gambar, qty: 1 }); }
            upUI();
        };

        window.changeQty = (index, delta) => {
            cart[index].qty += delta;
            if(cart[index].qty < 1) cart.splice(index, 1);
            upUI();
        };

        window.resetOrder = () => { if(confirm('Kosongkan keranjang?')) { cart = []; upUI(); } };

        function upUI() {
            const total = cart.reduce((s, i) => s + (i.harga * i.qty), 0);
            const cartEl = document.getElementById('cart');
            const countEl = document.getElementById('itemCount');
            
            if(cart.length > 0) {
                cartEl.classList.add('active');
                document.getElementById('cartTotalText').innerText = priceFmt(total);
                countEl.innerText = `${cart.length} Produk Terpilih`;
                renderReceipt();
            } else { 
                cartEl.classList.remove('active'); 
            }
        }

        function renderReceipt() {
            const isi = document.getElementById('isiNotaSimpel');
            isi.innerHTML = "";
            cart.forEach((item, index) => {
                isi.innerHTML += `
                    <div class="flex items-center gap-3 bg-white/5 p-3 rounded-2xl border border-white/5">
                        <img src="${item.gambar}" class="w-12 h-12 rounded-xl object-cover">
                        <div class="flex-1 min-w-0">
                            <p class="text-[11px] font-bold text-white truncate">${item.nama}</p>
                            <p class="text-[10px] text-indigo-400 font-bold">${priceFmt(item.harga)}</p>
                        </div>
                        <div class="flex items-center gap-4 bg-[#020617] px-3 py-2 rounded-xl border border-white/10">
                            <button onclick="changeQty(${index}, -1)" class="text-indigo-500 font-bold text-lg px-1">-</button>
                            <span class="text-xs font-black text-white w-4 text-center">${item.qty}</span>
                            <button onclick="changeQty(${index}, 1)" class="text-indigo-500 font-bold text-lg px-1">+</button>
                        </div>
                    </div>`;
            });
        }

        window.scrollKeRincian = () => {

<body class="pb-80">

    <main class="p-4 max-w-2xl mx-auto">

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="filterProduk('Semua', this)" class="cat-btn bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase whitespace-nowrap shadow-md">Semua</button>
                <script>
                    ["Pribadi","Profesional","Sosial","Finansial","Logistik","Edukasi","Digital","Kreativitas","Legal","Hiburan"].forEach(k => {

        <div id="notaFull" class="fixed inset-0 z-[60] glass-dark flex items-end justify-center hidden">

        <div id="summarySection" class="fixed bottom-0 left-0 right-0 z-40 p-4 transform translate-y-full transition-transform duration-300">
            <div class="max-w-md mx-auto bg-white p-6 rounded-t-[2.5rem] shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.2)] border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-lg font-bold text-slate-800">Total: <span id="totalHarga" class="text-blue-600 ml-1">Rp 0</span></span>
                    <button onclick="toggleNota()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Lihat Nota</button>

                <button onclick="processCheckout()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm uppercase shadow-xl flex justify-center items-center gap-2">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let rawData = {}, cart = [], curFilter = 'Semua', selectedVars = {};

        onValue(ref(db, 'produk'), (snap) => {
            rawData = snap.val();
            render();
        });

        window.filterProduk = (kat, btn) => {
            curFilter = kat;
            document.querySelectorAll('.cat-btn').forEach(b => b.className = "cat-btn bg-white text-slate-500 px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase whitespace-nowrap shadow-sm border border-slate-100");
            btn.className = "cat-btn bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase whitespace-nowrap shadow-md";
            render();
        };

        window.render = () => {
            const cont = document.getElementById('container');
            const search = document.getElementById('searchInput').value.toLowerCase();
            cont.innerHTML = "";

            for(let id in rawData) {
                const item = rawData[id];
                if((curFilter === 'Semua' || item.kategori === curFilter) && item.nama.toLowerCase().includes(search)) {
                    
                    let hasVar = item.stokDetail && item.stokDetail.includes(':');
                    let currentVar = selectedVars[id] || (hasVar ? item.stokDetail.split(',')[0].split(':')[0] : "Normal");
                    
                    // Hitung harga berdasar varian terpilih
                    let price = item.harga;
                    if(hasVar) {
                        const match = item.stokDetail.split(',').find(v => v.trim().startsWith(currentVar));
                        if(match) price = parseInt(match.split(':')[1]);
                    }

                    let controls = "";
                    if (hasVar) {
                        controls = `<select onchange="updateVarSelection('${id}', this)" class="w-full bg-slate-50 border-none rounded-lg p-2 text-[10px] font-bold text-blue-600 outline-none mb-2">`;
                        item.stokDetail.split(',').forEach(v => {
                            const [sz, pr, qt] = v.trim().split(':');
                            const inCart = cart.find(c => c.id === id && c.sz === sz)?.qty || 0;
                            const sisa = parseInt(qt) - inCart;
                            if(sisa > 0) controls += `<option value="${sz}" ${sz === currentVar ? 'selected' : ''}>${sz} (Rp ${parseInt(pr).toLocaleString()})</option>`;
                        });
                        controls += `</select>`;
                    }

                    const totalInCart = cart.filter(c => c.id === id).reduce((s, c) => s + c.qty, 0);

                    cont.innerHTML += `
                        <div class="menu-card p-3 flex flex-col">
                            <img src="${item.gambar}" class="w-full h-32 object-cover rounded-xl mb-3">
                            <h4 class="font-extrabold text-[13px] text-slate-800 leading-tight mb-1 h-10 overflow-hidden">${item.nama}</h4>
                            <p class="text-blue-600 font-black text-sm mb-3">Rp ${price.toLocaleString()}</p>
                            ${controls}
                            <div class="flex items-center gap-2">
                                <button onclick="toCart('${id}')" class="bg-blue-600 text-white text-[10px] px-3 py-2.5 rounded-xl font-black flex-1 shadow-md active:scale-90 transition-all">PESAN</button>
                                <div class="flex items-center bg-blue-50 rounded-xl p-1">
                                    <span class="px-2 text-xs font-black text-blue-600">${totalInCart}</span>
                                </div>
                            </div>
                        </div>`;
                }
            }
            updateSummary();
        };

        window.updateVarSelection = (id, el) => {
            selectedVars[id] = el.value;
            render(); // Render ulang agar harga di kartu berubah mengikuti pilihan dropdown
        };

        window.toCart = (id) => {
            const item = rawData[id];
            const sz = selectedVars[id] || (item.stokDetail ? item.stokDetail.split(',')[0].split(':')[0] : "Normal");
            
            let pr = item.harga, mx = item.stokDasar;
            if(item.stokDetail && item.stokDetail.includes(':')) {
                const match = item.stokDetail.split(',').find(v => v.trim().startsWith(sz));
                pr = parseInt(match.split(':')[1]);
                mx = parseInt(match.split(':')[2]);
            }

            const exist = cart.find(c => c.id === id && c.sz === sz);
            if(exist) {
                if(exist.qty < mx) exist.qty += 1; else alert("Stok Habis!");
            } else {
                cart.push({ id, nama: item.nama, harga: pr, sz, qty: 1, max: mx, img: item.gambar });
            }
            render();
        };

        window.changeQty = (idx, delta) => {
            cart[idx].qty += delta;
            if(cart[idx].qty > cart[idx].max) { cart[idx].qty = cart[idx].max; alert("Stok Maksimal!"); }
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            if(cart.length === 0) document.getElementById('notaFull').classList.add('hidden');
            render();
            updateNotaList();
        };

        window.toggleNota = () => document.getElementById('notaFull').classList.toggle('hidden') || updateNotaList();

        function updateNotaList() {
            const list = document.getElementById('listDetail');
            list.innerHTML = "";
            cart.forEach((c, idx) => {
                list.innerHTML += `
                    <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-2xl">
                        <img src="${c.img}" class="w-16 h-16 object-cover rounded-xl">
                        <div class="flex-1">
                            <h5 class="text-xs font-black text-slate-800 uppercase">${c.nama}</h5>
                            <p class="text-[10px] text-blue-600 font-bold">${c.sz} | Rp ${c.harga.toLocaleString()}</p>
                        </div>
                        <div class="flex items-center bg-white rounded-lg shadow-sm border border-slate-100">
                            <button onclick="changeQty(${idx}, -1)" class="w-8 h-8 font-bold text-slate-400">-</button>
                            <span class="px-2 text-xs font-black">${c.qty}</span>
                            <button onclick="changeQty(${idx}, 1)" class="w-8 h-8 font-bold text-blue-600">+</button>
                        </div>
                    </div>`;
            });
        }

        function updateSummary() {
            const totalVal = cart.reduce((s, c) => s + (c.harga * c.qty), 0);
            const totalItem = cart.reduce((s, c) => s + c.qty, 0);
            document.getElementById('totalHarga').innerText = "Rp " + totalVal.toLocaleString();
            document.getElementById('cartCount').innerText = totalItem;
            document.getElementById('summarySection').style.transform = cart.length > 0 ? "translateY(0)" : "translateY(100%)";
        }

        window.processCheckout = async () => {
            let msg = `*ORDER DJAMANTARA*%0A%0A`;
            try {
                for (let item of cart) {
                    const snap = await get(ref(db, `produk/${item.id}`));
                    const current = snap.val();
                    if(item.sz === "Normal") {
                        await update(ref(db, `produk/${item.id}`), { stokDasar: current.stokDasar - item.qty });
                    } else {
                        let newArr = current.stokDetail.split(',').map(v => {
                            let p = v.trim().split(':');
                            return p[0] === item.sz ? `${p[0]}:${p[1]}:${parseInt(p[2]) - item.qty}` : v.trim();
                        });
                        await update(ref(db, `produk/${item.id}`), { stokDetail: newArr.join(', ') });
                    }
                    msg += `- ${item.nama} (${item.sz}) x${item.qty}%0A`;
                }
                window.open(`https://wa.me/62895397276430?text=${msg}%0A*TOTAL: ${document.getElementById('totalHarga').innerText}*`, '_blank');
                cart = []; render();
                document.getElementById('notaFull').classList.add('hidden');
            } catch (e) { alert("Error Database!"); }
        };
    </script>
</body>
</html>

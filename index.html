<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djamantara Premium Supply</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #020617; color: white; margin: 0; padding-bottom: 80px; }

        /* Header */
        .header { background-color: #020617; padding: 20px; text-align: center; border-bottom: 1px solid #1e293b; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .sub-logo { font-size: 10px; color: #94a3b8; letter-spacing: 3px; margin-bottom: 15px; }
        
        .btn-bayar { 
            background-color: #6366f1; color: white; border: none; 
            padding: 12px; width: 80%; border-radius: 50px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        /* Search Bar */
        .search-container { padding: 15px; }
        .search-bar { 
            width: 100%; background: #0f172a; border: 1px solid #1e293b; 
            padding: 10px; border-radius: 8px; color: white; 
        }

        /* Grid Produk */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .card { background: #0f172a; border-radius: 15px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 150px; object-fit: cover; opacity: 0.6; }
        
        .card-title {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; text-align: center; background: rgba(0,0,0,0.5);
            padding: 5px; border-radius: 4px; font-size: 11px; font-weight: bold;
        }
        
        .card-info { padding: 10px; text-align: center; }
        .price { font-weight: bold; font-size: 16px; margin: 5px 0; }

        /* Modal Rincian (Slide Up) */
        #modalRincian {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: #020617; border-top: 2px solid #6366f1; 
            z-index: 1000; transition: 0.5s; padding: 20px;
            border-radius: 25px 25px 0 0;
        }
        #modalRincian.active { bottom: 0; }

        /* Item Rincian */
        .item-rincian {
            display: flex; align-items: center; background: #0f172a;
            padding: 10px; border-radius: 12px; margin-bottom: 10px;
        }
        .mini-img { width: 45px; height: 45px; border-radius: 8px; margin-right: 12px; }
        .counter { display: flex; align-items: center; background: #020617; border-radius: 5px; padding: 2px 8px; }
        .counter button { background: none; border: none; color: #6366f1; font-size: 18px; cursor: pointer; }
        .counter input { width: 25px; background: none; border: none; color: white; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">DJAMANTARA</h1>
        <div class="sub-logo">PREMIUM SUPPLY</div>
        <button class="btn-bayar" onclick="toggleModal(true)">🛒 BAYAR PESANAN</button>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Cari produk...">
    </div>

    <div class="product-grid">
        <div class="card">
            <img src="topi.jpg" alt="Topi">
            <div class="card-title">TOPI TELADAN</div>
            <div class="card-info">
                <div class="price">Rp 20.000</div>
            </div>
        </div>
        <div class="card">
            <img src="dasi.jpg" alt="Dasi">
            <div class="card-title">DASI SD VELCRO</div>
            <div class="card-info">
                <div class="price">Rp 7.000</div>
            </div>
        </div>
    </div>

    <div id="modalRincian">
        <p style="text-align: center; color: #6366f1; font-weight: bold; font-size: 12px;">RINCIAN BELANJA ANDA</p>
        
        <div id="containerItem">
            <div class="item-rincian">
                <img src="dasi.jpg" class="mini-img">
                <div style="flex: 1;">
                    <div style="font-size: 13px; font-weight: bold;">DASI SD VELCRO</div>
                    <div style="font-size: 11px; color: #64748b;">COWOK | Rp 7.000</div>
                </div>
                <div class="counter">
                    <button onclick="ubahJumlah(-1)">-</button>
                    <input type="text" id="qty" value="1" readonly>
                    <button onclick="ubahJumlah(1)">+</button>
                </div>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <p style="color: #64748b; font-size: 12px; margin-bottom: 5px;">TOTAL PEMBAYARAN</p>
            <h2 id="totalHarga" style="margin: 0 0 20px 0;">Rp 7.000</h2>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="toggleModal(false)" style="flex:1; padding: 15px; border-radius: 12px; background: #1e293b; color: white; border: none;">KEMBALI</button>
                <button style="flex:2; padding: 15px; border-radius: 12px; background: #6366f1; color: white; border: none; font-weight: bold;">CHECKOUT WA →</button>
            </div>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('modalRincian');
            if(show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
            }
        }

        function ubahJumlah(change) {
            const qtyInput = document.getElementById('qty');
            const totalText = document.getElementById('totalHarga');
            let currentQty = parseInt(qtyInput.value);
            
            currentQty += change;
            if(currentQty < 1) currentQty = 1; // Minimal 1 barang
            
            qtyInput.value = currentQty;
            
            // Hitung harga (Contoh statis Rp 7.000)
            let total = currentQty * 7000;
            totalText.innerText = "Rp " + total.toLocaleString('id-ID');
        }
    </script>
</body>
</html>

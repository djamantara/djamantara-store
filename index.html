<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djamantara Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-blue-600 p-8 rounded-b-[3.5rem] shadow-xl text-white mb-8 text-center">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">DJAMANTARA</h1>
        <p class="text-[9px] font-bold opacity-70 uppercase tracking-widest mt-1">Bhumie01 Store</p>
    </div>

    <div class="px-6">
        <div id="shopList" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-center py-10 opacity-20 text-[10px] uppercase font-black">Loading Database...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'produk'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('shopList');
            container.innerHTML = "";

            if(!data) {
                container.innerHTML = "<div class='col-span-2 text-center py-20 opacity-30 font-black uppercase text-[10px]'>Belum ada barang</div>";
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                let price = item.harga || 0;
                let sub = "";

                if (item.stokDetail && item.stokDetail.includes(':')) {
                    const variants = item.stokDetail.split(',').map(v => parseInt(v.split(':')[1])).filter(h => !isNaN(h));
                    if (variants.length > 0) {
                        price = Math.min(...variants);
                        sub = "<span class='text-[7px] text-slate-400 font-bold uppercase'>Mulai</span>";
                    }
                }

                container.innerHTML += `
                    <div class="bg-white rounded-[2.5rem] p-4 shadow-sm border border-slate-100 flex flex-col">
                        <div class="relative w-full aspect-square overflow-hidden rounded-[2rem] bg-slate-100 mb-3">
                            <img src="${item.gambar}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="font-black text-slate-900 text-[10px] uppercase truncate px-1">${item.nama}</h3>
                        <div class="mt-1 mb-3 px-1">
                            ${sub}
                            <p class="font-black text-blue-600 text-sm leading-none">Rp ${price.toLocaleString('id-ID')}</p>
                        </div>
                        <button class="w-full bg-blue-600 text-white font-black py-3 rounded-2xl text-[8px] uppercase active:scale-95 shadow-lg shadow-blue-600/20">BELI</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>

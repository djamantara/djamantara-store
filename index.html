<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djamantara</title>
    <style>
        /* Base Reset */
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background-color: #020617; color: white; padding-bottom: 20px; }

        /* Header Dark */
        .header { background-color: #020617; padding: 25px 20px; text-align: center; border-bottom: 1px solid #1e293b; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .sub-logo { font-size: 10px; color: #94a3b8; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase; }
        
        .btn-bayar-utama { 
            background-color: #6366f1; color: white; border: none; 
            padding: 14px; width: 85%; border-radius: 50px; 
            font-weight: bold; cursor: pointer; font-size: 14px;
        }

        /* Search Bar */
        .search-box { padding: 15px; }
        .search-input { 
            width: 100%; background: #0f172a; border: 1px solid #1e293b; 
            padding: 12px; border-radius: 8px; color: white; outline: none;
        }

        /* Product Grid */
        .grid-container { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 12px; padding: 12px; 
        }

        /* Card Styling - Agar teks pas di tengah gambar */
        .product-card { 
            background: #0f172a; border-radius: 12px; overflow: hidden; 
            position: relative; height: 180px; /* Tinggi tetap agar rapi */
        }
        
        .product-card img { 
            width: 100%; height: 100%; object-fit: cover; 
            opacity: 0.5; /* Gambar agak gelap agar teks terbaca */
        }

        .overlay-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            text-align: center; padding: 5px; pointer-events: none;
        }

        .item-name {
            background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px;
            font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;
        }

        .item-price { font-size: 16px; font-weight: bold; }

        /* Modal Rincian (Disembunyikan di bawah) */
        #modalCheckout {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: #0f172a; border-top: 3px solid #6366f1; 
            z-index: 9999; transition: 0.4s ease-in-out; 
            padding: 20px; border-radius: 25px 25px 0 0;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
        }
        #modalCheckout.open { bottom: 0; }

        /* Rincian Items */
        .row-item {
            display: flex; align-items: center; background: #1e293b;
            padding: 12px; border-radius: 12px; margin-bottom: 10px;
        }
        .img-mini { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
        
        .qty-control { display: flex; align-items: center; gap: 10px; background: #020617; padding: 5px 10px; border-radius: 8px; }
        .qty-control button { background: none; border: none; color: #6366f1; font-size: 20px; cursor: pointer; font-weight: bold; }
        .qty-control input { width: 30px; background: none; border: none; color: white; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">DJAMANTARA</h1>
        <div class="sub-logo">PREMIUM SUPPLY</div>
        <button class="btn-bayar-utama" onclick="bukaModal()">🛒 BAYAR PESANAN</button>
    </div>

    <div class="search-box">
        <input type="text" class="search-input" placeholder="Cari produk...">
    </div>

    <div class="grid-container">
        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Topi"> <div class="overlay-text">
                <div class="item-name">TOPI TELADAN</div>
                <div class="item-price">Rp 20.000</div>
            </div>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/200" alt="Dasi"> <div class="overlay-text">
                <div class="item-name">DASI SD VELCRO</div>
                <div class="item-price">Rp 7.000</div>
            </div>
        </div>
    </div>

    <div id="modalCheckout">
        <h3 style="text-align: center; color: #6366f1; font-size: 14px; margin-bottom: 20px;">RINCIAN BELANJA ANDA</h3>
        
        <div class="row-item">
            <img src="https://via.placeholder.com/50" class="img-mini">
            <div style="flex: 1;">
                <div style="font-size: 13px; font-weight: bold;">DASI SD VELCRO</div>
                <div style="font-size: 11px; color: #94a3b8;">COWOK | Rp 7.000</div>
            </div>
            <div class="qty-control">
                <button onclick="updateQty(-1)">-</button>
                <input type="text" id="jumlahBarang" value="1" readonly>
                <button onclick="updateQty(1)">+</button>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <p style="color: #94a3b8; font-size: 12px;">TOTAL PEMBAYARAN</p>
            <h1 id="totalHargaDisplay" style="margin: 10px 0 25px 0;">Rp 7.000</h1>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="tutupModal()" style="flex: 1; padding: 15px; border: none; border-radius: 12px; background: #1e293b; color: white;">KEMBALI</button>
                <button style="flex: 2; padding: 15px; border: none; border-radius: 12px; background: #6366f1; color: white; font-weight: bold;">CHECKOUT WA →</button>
            </div>
        </div>
    </div>

    <script>
        function bukaModal() {
            document.getElementById('modalCheckout').classList.add('open');
        }

        function tutupModal() {
            document.getElementById('modalCheckout').classList.remove('open');
        }

        function updateQty(val) {
            let input = document.getElementById('jumlahBarang');
            let totalTxt = document.getElementById('totalHargaDisplay');
            let current = parseInt(input.value);
            
            current += val;
            if (current < 1) current = 1;
            
            input.value = current;
            
            // Hitung harga (contoh harga dasi 7000)
            let total = current * 7000;
            totalTxt.innerText = "Rp " + total.toLocaleString('id-ID');
        }
    </script>
</body>
</html>

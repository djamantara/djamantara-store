<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Djamantara | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.94); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-anim { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-anim:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 20px 40px -15px rgba(59, 130, 246, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bill-dashed { border-top: 2px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-slate-300">

    <nav class="sticky top-0 z-[60] glass border-b border-white/5 py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-white tracking-tighter uppercase">Djamantara</h1>
            <div class="flex items-center gap-3">
                <button onclick="toggleModal('modalHelp')" class="text-[10px] font-black uppercase text-blue-400 border border-blue-500/20 px-5 py-2.5 rounded-full">Bantuan</button>
                <input type="text" id="searchInput" onkeyup="searchHandler()" placeholder="Cari..." class="hidden sm:block bg-slate-900 border border-white/10 rounded-full py-2 px-6 outline-none text-[11px] font-bold w-40 focus:w-60 transition-all">
            </div>
        </div>
    </nav>

    <div id="modalNota" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-center justify-center hidden p-4">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-[3rem] max-w-xl w-full shadow-2xl relative">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-white italic uppercase tracking-tighter">Nota Belanja</h2>
                <p class="text-[9px] text-slate-500 font-bold tracking-[0.4em] uppercase mt-1">Djamantara Official Store</p>
            </div>
            
            <div id="isiNota" class="space-y-4 max-h-[45vh] overflow-y-auto no-scrollbar mb-8 pr-2">
                </div>

            <div class="bill-dashed pt-6 mb-8 flex justify-between items-end">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Subtotal Akhir</p>
                    <p id="subtotalNota" class="text-3xl font-black text-blue-500 tracking-tighter">Rp 0</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-slate-700 font-black italic uppercase">Order Summary</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="toggleModal('modalNota')" class="py-4 rounded-2xl font-black text-[10px] uppercase text-slate-500 border border-white/10 hover:bg-white/5 transition-all">Tambah Barang</button>
                <button onclick="sendToWA()" class="py-4 rounded-2xl font-black text-[10px] uppercase bg-blue-600 text-white shadow-lg shadow-blue-600/30 hover:bg-blue-500 transition-all">Konfirmasi WA</button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-10 pb-40">
        <div class="overflow-x-auto no-scrollbar mb-10">
            <div class="flex gap-3 min-w-max pb-2">
                <button onclick="filterProduk('Semua', this)" class="cat-btn bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-black text-[10px] uppercase shadow-xl shadow-blue-600/20">Semua</button>
                <button onclick="filterProduk('Pribadi', this)" class="cat-btn glass px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase text-slate-500">Pribadi</button>
                <button onclick="filterProduk('Profesional', this)" class="cat-btn glass px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase text-slate-500">Profesional</button>
                <button onclick="filterProduk('Digital', this)" class="cat-btn glass px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase text-slate-500">Digital</button>
            </div>
        </div>
        <div id="container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10"></div>
    </main>

    <div id="cart" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[80] w-[90%] max-w-md hidden">
        <div class="bg-blue-600 p-7 rounded-[3rem] shadow-2xl text-white flex justify-between items-center border border-white/20">
            <div><p class="text-[9px] font-black uppercase opacity-60">Total Sementara</p><p class="font-black text-2xl tracking-tighter" id="cartTotalText">Rp 0</p></div>
            <button onclick="showBill()" class="bg-white text-blue-600 px-8 py-4 rounded-2xl font-black uppercase text-[10px] shadow-xl hover:scale-105 transition-all">Lihat Nota</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let rawData = {}, cart = [], curFilter = 'Semua';

        onValue(ref(db, 'produk'), (snap) => { rawData = snap.val(); render(); });

        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');

        window.filterProduk = (kat, btn) => {
            curFilter = kat;
            document.querySelectorAll('.cat-btn').forEach(b => b.className = "cat-btn glass px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase text-slate-500");
            btn.className = "cat-btn bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-black text-[10px] uppercase shadow-xl";
            render();
        };

        const priceFmt = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits:0 }).format(v);

        window.render = (key = '') => {
            const cont = document.getElementById('container');
            cont.innerHTML = "";
            for(let id in rawData) {
                const item = rawData[id];
                if((curFilter === 'Semua' || item.kategori === curFilter) && item.nama.toLowerCase().includes(key.toLowerCase())) {
                    let iniPrice = item.harga;
                    let varHtml = "";
                    if (item.stokDetail) {
                        const vList = item.stokDetail.split(',');
                        iniPrice = parseInt(vList[0].split(':')[1]);
                        varHtml = `<select id="sel-${id}" onchange="upPrice('${id}', this)" class="w-full mb-4 p-3.5 rounded-2xl bg-slate-900 border border-white/10 text-[10px] font-black uppercase text-blue-400 outline-none">`;
                        vList.forEach(v => {
                            const [sz, pr, qt] = v.split(':');
                            if(parseInt(qt) > 0) varHtml += `<option value="${sz.trim()}" data-price="${pr.trim()}">${sz.trim()} (${priceFmt(pr.trim())})</option>`;
                        });
                        varHtml += `</select>`;
                    }
                    cont.innerHTML += `
                        <div class="card-anim glass rounded-[3.5rem] overflow-hidden flex flex-col h-full border border-white/5 relative">
                            <img src="${item.gambar}" class="w-full h-64 object-cover">
                            <div class="p-8 flex flex-col flex-1">
                                <h3 class="text-xl font-black text-white mb-2 uppercase tracking-tighter leading-tight">${item.nama}</h3>
                                <div class="mt-auto">
                                    ${varHtml}
                                    <p id="prc-${id}" class="text-white font-black text-2xl mb-6 tracking-tighter">${priceFmt(iniPrice)}</p>
                                    <button onclick="${item.tersedia ? `toCart('${id}')` : ''}" class="w-full py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all ${item.tersedia ? 'bg-white text-slate-950 hover:bg-blue-600 hover:text-white' : 'bg-slate-800 text-slate-600 cursor-not-allowed'}">${item.tersedia ? 'Tambah Ke Order' : 'Habis'}</button>
                                </div>
                            </div>
                        </div>`;
                }
            }
        };

        window.upPrice = (id, el) => {
            const pr = el.options[el.selectedIndex].getAttribute('data-price');
            document.getElementById(`prc-${id}`).innerText = priceFmt(pr);
        };

        window.toCart = (id) => {
            const el = document.getElementById(`sel-${id}`);
            const pr = el ? parseInt(el.options[el.selectedIndex].getAttribute('data-price')) : rawData[id].harga;
            const sz = el ? el.value : '-';
            const exist = cart.find(i => i.id === id && i.sz === sz);
            if(exist) { exist.qty += 1; } else { cart.push({ id, nama: rawData[id].nama, harga: pr, sz, qty: 1 }); }
            upUI();
        };

        // FUNGSI UBAH QTY DI NOTA
        window.changeQty = (index, delta) => {
            cart[index].qty += delta;
            if(cart[index].qty < 1) {
                cart.splice(index, 1);
            }
            if(cart.length === 0) toggleModal('modalNota');
            showBill();
            upUI();
        };

        function upUI() {
            const total = cart.reduce((s, i) => s + (i.harga * i.qty), 0);
            if(cart.length > 0) {
                document.getElementById('cart').classList.remove('hidden');
                document.getElementById('cartTotalText').innerText = priceFmt(total);
            } else {
                document.getElementById('cart').classList.add('hidden');
            }
        }

        window.showBill = () => {
            const isi = document.getElementById('isiNota');
            let total = 0;
            isi.innerHTML = "";
            cart.forEach((item, index) => {
                const sub = item.harga * item.qty;
                total += sub;
                isi.innerHTML += `
                    <div class="bg-white/5 p-5 rounded-[2rem] border border-white/5 flex flex-col gap-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-xs font-black text-white uppercase tracking-tighter">${item.nama}</h4>
                                <p class="text-[9px] text-slate-500 font-bold uppercase mt-1">Ukuran: ${item.sz} | ${priceFmt(item.harga)}</p>
                            </div>
                            <p class="text-sm font-black text-blue-400">${priceFmt(sub)}</p>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center bg-slate-950 rounded-xl border border-white/10 p-1">
                                <button onclick="changeQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center text-white font-bold hover:bg-red-500/20 rounded-lg transition-all">-</button>
                                <span class="px-4 text-xs font-black text-white">${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center text-white font-bold hover:bg-blue-500/20 rounded-lg transition-all">+</button>
                            </div>
                            <button onclick="changeQty(${index}, -${item.qty})" class="text-[8px] font-black text-red-500/50 uppercase tracking-widest hover:text-red-500">Hapus Barang</button>
                        </div>
                    </div>`;
            });
            document.getElementById('subtotalNota').innerText = priceFmt(total);
            if(document.getElementById('modalNota').classList.contains('hidden')) toggleModal('modalNota');
        };

        window.sendToWA = () => {
            let total = 0;
            let msg = `*DJAMANTARA BILL*%0A------------------------------------%0A`;
            cart.forEach((i, x) => {
                const sub = i.harga * i.qty;
                total += sub;
                msg += `${x+1}. *${i.nama}*%0A   Ukuran: ${i.sz}%0A   Jumlah: ${i.qty} x ${i.harga.toLocaleString()}%0A   Subtotal: *Rp ${sub.toLocaleString()}*%0A%0A`;
            });
            msg += `------------------------------------%0A*TOTAL TAGIHAN: Rp ${total.toLocaleString()}*%0A------------------------------------%0A_Segera konfirmasi pembayaran ya, Boss!_`;
            window.open(`https://wa.me/62895397276430?text=${msg}`, '_blank');
            cart = []; upUI(); toggleModal('modalNota');
        };

        window.searchHandler = () => render(document.getElementById('searchInput').value);
    </script>
</body>
</html>

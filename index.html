<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Djamantara | Exclusive Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #cbd5e1; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .glass-card { 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05); 
        }
        
        /* Product Card Visuals */
        .product-img-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1/1; 
            overflow: hidden; 
            border-radius: 16px; 
        }
        .product-img-container img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:active img { transform: scale(1.05); }
        
        /* Gradient Overlay for Text Clarity */
        .img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(2, 6, 23, 0.8) 0%, transparent 60%);
        }

        /* Floating Receipt Animation */
        .live-receipt { 
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(99, 102, 241, 0.3);
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .live-receipt.active { transform: translateY(0); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Skeleton Loading Effect */
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-[60] bg-[#020617]/80 backdrop-blur-md border-b border-white/5 py-5 px-6">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div>
                <h1 class="text-2xl font-extrabold italic tracking-tighter uppercase leading-none text-white">Djamantara</h1>
                <p class="text-[8px] font-bold tracking-[0.3em] uppercase text-indigo-400 mt-1">Premium Digital Supply</p>
            </div>
            <button onclick="scrollKeRincian()" class="bg-indigo-600 p-2.5 rounded-full shadow-lg shadow-indigo-600/20 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
            </button>
        </div>
    </header>

    <div class="sticky top-[73px] z-[50] bg-[#020617]/95 backdrop-blur-sm py-4 px-6 border-b border-white/5">
        <div class="flex flex-col gap-4">
            <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-1">
                <button onclick="filterProduk('Semua', this)" class="cat-btn bg-indigo-600 text-white px-5 py-2 rounded-full font-bold text-[10px] uppercase whitespace-nowrap transition-all shadow-lg shadow-indigo-600/20">Semua</button>
                <button onclick="filterProduk('Pribadi', this)" class="cat-btn glass-card px-5 py-2 rounded-full text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Pribadi</button>
                <button onclick="filterProduk('Profesional', this)" class="cat-btn glass-card px-5 py-2 rounded-full text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Profesional</button>
                <button onclick="filterProduk('Digital', this)" class="cat-btn glass-card px-5 py-2 rounded-full text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Digital</button>
            </div>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" id="searchInput" onkeyup="searchHandler()" placeholder="Cari koleksi djamantara..." class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-3 pl-11 pr-4 outline-none text-xs focus:border-indigo-500 transition-all text-white">
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 mt-6">
        <div id="container" class="grid grid-cols-2 gap-4">
            <div class="loading-shimmer aspect-square rounded-2xl opacity-20"></div>
            <div class="loading-shimmer aspect-square rounded-2xl opacity-20"></div>
        </div>
    </main>

    <div id="cart" class="fixed bottom-0 left-0 right-0 z-[80] live-receipt px-6 pt-6 pb-8 rounded-t-[32px]">
        <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6"></div>
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-end mb-4 px-2">
                <div>
                    <h3 class="text-[10px] font-black tracking-[0.2em] text-indigo-400 uppercase">Keranjang Anda</h3>
                    <p class="text-xs text-slate-500" id="itemCount">0 Item Terpilih</p>
                </div>
                <button onclick="resetOrder()" class="text-[10px] font-bold text-red-400 uppercase">Hapus Semua</button>
            </div>
            
            <div id="isiNotaSimpel" class="space-y-3 max-h-[40vh] overflow-y-auto no-scrollbar mb-6 px-1">
                </div>

            <div class="flex items-center gap-4 bg-slate-900/80 p-4 rounded-3xl border border-white/5">
                <div class="flex-1">
                    <p class="text-[9px] font-bold uppercase text-slate-500 mb-0.5 ml-1">Total Estimasi</p>
                    <p class="font-extrabold text-xl tracking-tighter text-white" id="cartTotalText">Rp 0</p>
                </div>
                <button onclick="sendToWA()" class="bg-indigo-600 text-[11px] font-black uppercase px-8 py-4 rounded-2xl text-white shadow-xl shadow-indigo-600/40 active:scale-95 transition-all">
                    Checkout →
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa0EoSNnxgoxezzpzbkSIrEfwZdZc_7h0",
            authDomain: "djamantara-projeck1.firebaseapp.com",
            databaseURL: "https://djamantara-projeck1-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "djamantara-projeck1",
            storageBucket: "djamantara-projeck1.firebasestorage.app",
            messagingSenderId: "848439545978",
            appId: "1:848439545978:web:f4f70991aa43af2f0cabc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let rawData = {}, cart = [], curFilter = 'Semua';

        // Load Data
        onValue(ref(db, 'produk'), (snap) => { 
            rawData = snap.val(); 
            render(); 
        });

        const priceFmt = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits:0 }).format(v);

        window.filterProduk = (kat, btn) => {
            curFilter = kat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.className = "cat-btn glass-card px-5 py-2 rounded-full text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap transition-all";
            });
            btn.className = "cat-btn bg-indigo-600 text-white px-5 py-2 rounded-full font-bold text-[10px] uppercase whitespace-nowrap transition-all shadow-lg shadow-indigo-600/20";
            render();
        };

        window.render = (key = '') => {
            const cont = document.getElementById('container');
            cont.innerHTML = "";
            for(let id in rawData) {
                const item = rawData[id];
                const searchMatch = item.nama.toLowerCase().includes(key.toLowerCase());
                const categoryMatch = curFilter === 'Semua' || item.kategori === curFilter;

                if(searchMatch && categoryMatch) {
                    cont.innerHTML += `
                        <div class="product-card flex flex-col group">
                            <div class="product-img-container shadow-2xl">
                                <img src="${item.gambar}" loading="lazy" alt="${item.nama}">
                                <div class="img-overlay"></div>
                                <div class="absolute bottom-3 left-3 right-3">
                                    <h3 class="text-[11px] font-bold text-white leading-tight mb-1 truncate">${item.nama}</h3>
                                    <p class="text-indigo-400 font-extrabold text-sm tracking-tight">${priceFmt(item.harga)}</p>
                                </div>
                            </div>
                            <button onclick="toCart('${id}')" class="mt-3 w-full py-3 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-bold uppercase text-white active:bg-indigo-600 active:border-indigo-600 transition-all">
                                + Keranjang
                            </button>
                        </div>`;
                }
            }
        };

        window.toCart = (id) => {
            const item = rawData[id];
            const exist = cart.find(i => i.id === id);
            if(exist) { exist.qty += 1; } else { cart.push({ id, nama: item.nama, harga: item.harga, gambar: item.gambar, qty: 1 }); }
            upUI();
        };

        window.changeQty = (index, delta) => {
            cart[index].qty += delta;
            if(cart[index].qty < 1) cart.splice(index, 1);
            upUI();
        };

        window.resetOrder = () => { if(confirm('Kosongkan keranjang?')) { cart = []; upUI(); } };

        function upUI() {
            const total = cart.reduce((s, i) => s + (i.harga * i.qty), 0);
            const cartEl = document.getElementById('cart');
            const countEl = document.getElementById('itemCount');
            
            if(cart.length > 0) {
                cartEl.classList.add('active');
                document.getElementById('cartTotalText').innerText = priceFmt(total);
                countEl.innerText = `${cart.length} Produk Terpilih`;
                renderReceipt();
            } else { 
                cartEl.classList.remove('active'); 
            }
        }

        function renderReceipt() {
            const isi = document.getElementById('isiNotaSimpel');
            isi.innerHTML = "";
            cart.forEach((item, index) => {
                isi.innerHTML += `
                    <div class="flex items-center gap-3 bg-white/5 p-3 rounded-2xl border border-white/5">
                        <img src="${item.gambar}" class="w-12 h-12 rounded-xl object-cover">
                        <div class="flex-1 min-w-0">
                            <p class="text-[11px] font-bold text-white truncate">${item.nama}</p>
                            <p class="text-[10px] text-indigo-400 font-bold">${priceFmt(item.harga)}</p>
                        </div>
                        <div class="flex items-center gap-4 bg-[#020617] px-3 py-2 rounded-xl border border-white/10">
                            <button onclick="changeQty(${index}, -1)" class="text-indigo-500 font-bold text-lg px-1">-</button>
                            <span class="text-xs font-black text-white w-4 text-center">${item.qty}</span>
                            <button onclick="changeQty(${index}, 1)" class="text-indigo-500 font-bold text-lg px-1">+</button>
                        </div>
                    </div>`;
            });
        }

        window.scrollKeRincian = () => {
            if(cart.length === 0) return alert("Pilih produk favoritmu dulu!");
            document.getElementById('cart').classList.add('active');
        };

        window.sendToWA = () => {
            let msg = `*ORDER DJAMANTARA*%0A━━━━━━━━━━━━━━━%0A`;
            cart.forEach((i, x) => {
                msg += `_${x+1}_. *${i.nama}*%0A    ${i.qty}x → Rp ${(i.harga*i.qty).toLocaleString()}%0A`;
            });
            msg += `━━━━━━━━━━━━━━━%0A*TOTAL: Rp ${cart.reduce((s,i)=>s+(i.harga*i.qty),0).toLocaleString()}*`;
            window.open(`https://wa.me/62895397276430?text=${msg}`, '_blank');
        };

        window.searchHandler = () => render(document.getElementById('searchInput').value);
    </script>
</body>
</html>
